<!DOCTYPE html>
<html lang="id">
<head>

  <title>Embed Apps Script</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .container {
      width: 100%;
      height: 100vh;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <iframe 
      src="https://script.google.com/macros/s/AKfycbyL80h8tDWOr8k7Dmu4YQ4SPhcca3N4AU3HYIqGCorkjlwxm5DBleKCMG1v7cAmAZk/exec"
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
